name: PR-check

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: verify dependencies
        run: go mod verify

      - name: go static Analysis
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Test Build
        run: go build -v ./cmd/server/main.go
